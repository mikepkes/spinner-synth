    var PRESETS = [

        osc2Waveform: "sine", osc2Detune: -12, osc2Mix: 0.15,
        noiseType: "brown", noiseMix: 0.5, noiseDecay: 0.05,

      { name: "Metallic", p: Object.assign({}, DEFAULTS, {

        noiseMix: 0.3, noiseDecay: 0.015,
        filterType: "peaking", filterCutoff: 5000, filterQ: 10, filterEnvAmount: 3000, filterEnvDecay: 0.04,

        clickVolume: 0.7, friction: 0.988, pitchVariation: 0.08,
      })},
      { name: "Laser Zap", p: Object.assign({}, DEFAULTS, {
        waveform: "sawtooth", clickFreq: 6000, clickDecay: 0.12,
        osc2Waveform: "square", osc2Detune: 12, osc2Mix: 0.3,
        noiseMix: 0.05, noiseDecay: 0.01,
        filterType: "lowpass", filterCutoff: 8000, filterQ: 3, filterEnvAmount: 6000, filterEnvDecay: 0.1,
        distortion: 0.15, delayTime: 0.08, delayFeedback: 0.3, delayMix: 0.25,

      })},
      { name: "Deep Bass", p: Object.assign({}, DEFAULTS, {
        pegCount: 16, clickFreq: 400, clickDecay: 0.15, attack: 0.005,
        osc2Detune: -12, osc2Mix: 0.5,
        noiseType: "brown", noiseMix: 0.4, noiseDecay: 0.1,
        filterType: "lowpass", filterCutoff: 800, filterQ: 2, filterEnvAmount: 500, filterEnvDecay: 0.15,

        noiseMix: 0.05, noiseDecay: 0.005,
        filterCutoff: 7000, filterQ: 15,
        delayTime: 0.15, delayFeedback: 0.4, delayMix: 0.3, reverbDecay: 1.5, reverbMix: 0.35,

        pegCount: 20, waveform: "square", clickFreq: 2000, clickDecay: 0.05,
        osc2Waveform: "sawtooth", osc2Detune: 5, osc2Mix: 0.5,
        noiseMix: 0.7, noiseDecay: 0.06,
        filterType: "lowpass", filterCutoff: 3500, filterQ: 3, filterEnvAmount: 2000, filterEnvDecay: 0.05,

      { name: "Sci-Fi", p: Object.assign({}, DEFAULTS, {
        pegCount: 32, waveform: "sawtooth", clickFreq: 3500, clickDecay: 0.08, attack: 0.002,
        osc2Waveform: "square", osc2Detune: -5, osc2Mix: 0.3,

      })},
      { name: "Cathedral", p: Object.assign({}, DEFAULTS, {
        waveform: "sine", clickFreq: 2800, clickDecay: 0.1, attack: 0.003,
        osc2Mix: 0, noiseMix: 0.1, noiseDecay: 0.02,
        filterType: "lowpass", filterCutoff: 3000, filterQ: 1,

      })},
      { name: "Glitch", p: Object.assign({}, DEFAULTS, {
        pegCount: 60, waveform: "square", clickFreq: 5000, clickDecay: 0.008,
        osc2Waveform: "sawtooth", osc2Detune: 17, osc2Mix: 0.4,
        noiseMix: 0.9, noiseDecay: 0.005,
        filterType: "highpass", filterCutoff: 3000, filterQ: 8, filterEnvAmount: 5000, filterEnvDecay: 0.008,
        distortion: 0.3, delayTime: 0.05, delayFeedback: 0.6, delayMix: 0.3,
        clickVolume: 0.7, friction: 0.995, pitchVariation: 0.45,
      })},
    ];

    // ===== Audio Helpers =====
    function makeDistortionCurve(amount) {
      var n = 8192;
      var curve = new Float32Array(n);
      var k = amount * 50 + 1;
      for (var i = 0; i < n; i++) {
        var x = (i * 2) / n - 1;
        curve[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
      }
      return curve;
    }

    function createReverbIR(ctx, decay) {
      var rt = Math.max(decay, 0.1);
      var len = Math.ceil(ctx.sampleRate * rt);
      var buf = ctx.createBuffer(2, len, ctx.sampleRate);
      var rate = -6.908 / rt;
      for (var ch = 0; ch < 2; ch++) {
        var d = buf.getChannelData(ch);
        for (var i = 0; i < len; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.exp(rate * i / ctx.sampleRate);
        }
      }
      return buf;
    }

    function waveAt(type, phase) {
      switch (type) {
        case "sine": return Math.sin(2 * Math.PI * phase);
        case "square": return phase < 0.5 ? 1 : -1;
        case "sawtooth": return 2 * phase - 1;
        case "triangle": return 4 * Math.abs(phase - 0.5) - 1;
        default: return Math.sin(2 * Math.PI * phase);
      }
    }

    function pnoise(i) {
      var x = Math.sin(i * 12.9898 + 78.233) * 43758.5453;
      return (x - Math.floor(x)) * 2 - 1;
    }

    function biquadCoeffs(type, cutoff, q, sr) {
      var w0 = 2 * Math.PI * Math.min(Math.max(cutoff, 20), sr / 2 - 100) / sr;
      var s0 = Math.sin(w0), c0 = Math.cos(w0);
      var alpha = s0 / (2 * Math.max(q, 0.001));
      var b0, b1, b2, a0, a1, a2;
      switch (type) {
        case "lowpass":
          b0 = (1 - c0) / 2; b1 = 1 - c0; b2 = (1 - c0) / 2;
          a0 = 1 + alpha; a1 = -2 * c0; a2 = 1 - alpha; break;
        case "highpass":
          b0 = (1 + c0) / 2; b1 = -(1 + c0); b2 = (1 + c0) / 2;
          a0 = 1 + alpha; a1 = -2 * c0; a2 = 1 - alpha; break;
        case "bandpass":
          b0 = alpha; b1 = 0; b2 = -alpha;
          a0 = 1 + alpha; a1 = -2 * c0; a2 = 1 - alpha; break;
        case "notch":
          b0 = 1; b1 = -2 * c0; b2 = 1;
          a0 = 1 + alpha; a1 = -2 * c0; a2 = 1 - alpha; break;
        case "peaking":
          var A = Math.pow(10, 0.15);
          b0 = 1 + alpha * A; b1 = -2 * c0; b2 = 1 - alpha * A;
          a0 = 1 + alpha / A; a1 = -2 * c0; a2 = 1 - alpha / A; break;
        default:
          return { b0: 1, b1: 0, b2: 0, a1: 0, a2: 0 };
      }
      return { b0: b0 / a0, b1: b1 / a0, b2: b2 / a0, a1: a1 / a0, a2: a2 / a0 };
    }

    function computePreview(p) {
      var sr = 44100;
      var dur = Math.max(p.clickDecay, p.noiseDecay) * 3 + p.attack;
      var n = Math.min(Math.ceil(sr * dur), sr);
      if (n < 64) n = 64;
      var out = new Float32Array(n);
      var dt = 1 / sr;
      var toneMix = 1 - p.noiseMix;
      var freq = p.clickFreq;
      var ph1 = 0, ph2 = 0;
      var dm = Math.pow(2, p.osc2Detune / 12);

      for (var i = 0; i < n; i++) {
        var t = i * dt;
        var s = 0;
        var sweep = 1 - 0.5 * Math.min(t / Math.max(p.clickDecay, 0.001), 1);
        ph1 += freq * sweep * dt; ph1 -= Math.floor(ph1);
        ph2 += freq * dm * sweep * dt; ph2 -= Math.floor(ph2);
        var ta = Math.max(t - p.attack, 0);
        var tau = Math.max(p.clickDecay * 0.3, 0.001);
        var env1 = Math.exp(-ta / tau);
        var env2 = Math.exp(-ta / (tau * 0.5));
        if (toneMix > 0) {
          s += waveAt(p.waveform, ph1) * env1 * toneMix * 0.7;
          if (p.osc2Mix > 0) s += waveAt(p.osc2Waveform, ph2) * env2 * p.osc2Mix * toneMix * 0.5;
        }
        if (p.noiseMix > 0.01) {
          var nEnv = Math.exp(-ta / Math.max(p.noiseDecay * 0.4, 0.001));
          s += pnoise(i) * nEnv * p.noiseMix * 0.9;
        }
        if (p.attack > 0 && t < p.attack) s *= t / p.attack;
        out[i] = s * p.clickVolume;
      }

      // Apply biquad filter
      var x1 = 0, x2 = 0, y1 = 0, y2 = 0;
      var filtered = new Float32Array(n);
      for (var i = 0; i < n; i++) {
        var t = i * dt;
        var fc = p.filterCutoff + p.filterEnvAmount * Math.exp(-t / Math.max(p.filterEnvDecay * 0.3, 0.001));
        var co = biquadCoeffs(p.filterType, fc, p.filterQ, sr);
        var x0 = out[i];
        filtered[i] = co.b0 * x0 + co.b1 * x1 + co.b2 * x2 - co.a1 * y1 - co.a2 * y2;
        x2 = x1; x1 = x0; y2 = y1; y1 = filtered[i];
        if (filtered[i] > 1) filtered[i] = 1;
        if (filtered[i] < -1) filtered[i] = -1;
      }
      return filtered;
    }

    // ===== Main Component =====
    function WheelSynth() {
      var _p = useState(Object.assign({}, DEFAULTS));
      var params = _p[0], setParams = _p[1];
      var _a = useState(0);
      var angle = _a[0], setAngle = _a[1];
      var _d = useState(false);
      var isDragging = _d[0], setIsDragging = _d[1];
      var _dart = useState(false);
      var showDart = _dart[0], setShowDart = _dart[1];
      var _spin = useState(false);
      var isSpinning = _spin[0], setIsSpinning = _spin[1];
      var _audio = useState(false);
      var audioReady = _audio[0], setAudioReady = _audio[1];
      var _sec = useState({ osc: true, noise: true, filter: true, fx: false, wheel: true });
      var openSections = _sec[0], setOpenSections = _sec[1];

      var audioCtxRef = useRef(null);
      var audioGraphRef = useRef(null);
      var wheelRef = useRef(null);
      var scopeRef = useRef(null);
      var animRef = useRef(null);
      var angleRef = useRef(0);
      var velocityRef = useRef(0);
      var lastPegRef = useRef(-1);
      var lastDragRef = useRef({ angle: 0, time: 0 });
      var paramsRef = useRef(params);
      var isDraggingRef = useRef(false);
      var previewRef = useRef(null);
      var previewDirtyRef = useRef(true);

      useEffect(function() { paramsRef.current = params; previewDirtyRef.current = true; }, [params]);
      useEffect(function() { isDraggingRef.current = isDragging; }, [isDragging]);

      // ===== Audio Graph Setup =====
      function setupAudioGraph(ctx) {
        var analyser = ctx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.3;

        var outputBus = ctx.createGain();
        outputBus.gain.setValueAtTime(1, ctx.currentTime);
        outputBus.connect(analyser);
        analyser.connect(ctx.destination);

        var masterBus = ctx.createGain();
        masterBus.gain.setValueAtTime(1, ctx.currentTime);

        var waveshaper = ctx.createWaveShaper();
        waveshaper.curve = makeDistortionCurve(0);
        waveshaper.oversample = "4x";
        masterBus.connect(waveshaper);
        waveshaper.connect(outputBus);

        var delayNode = ctx.createDelay(1.0);
        delayNode.delayTime.setValueAtTime(0.001, ctx.currentTime);
        var delayFb = ctx.createGain();
        delayFb.gain.setValueAtTime(0, ctx.currentTime);
        var delayWet = ctx.createGain();
        delayWet.gain.setValueAtTime(0, ctx.currentTime);
        waveshaper.connect(delayNode);
        delayNode.connect(delayFb);
        delayFb.connect(delayNode);
        delayNode.connect(delayWet);
        delayWet.connect(outputBus);

        var convolver = ctx.createConvolver();
        convolver.buffer = createReverbIR(ctx, 0.1);
        var reverbWet = ctx.createGain();
        reverbWet.gain.setValueAtTime(0, ctx.currentTime);
        waveshaper.connect(convolver);
        convolver.connect(reverbWet);
        reverbWet.connect(outputBus);

        return { analyser: analyser, masterBus: masterBus, outputBus: outputBus,
          waveshaper: waveshaper, delayNode: delayNode, delayFb: delayFb,
          delayWet: delayWet, convolver: convolver, reverbWet: reverbWet };
      }

      var ensureAudio = useCallback(function() {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
          audioGraphRef.current = setupAudioGraph(audioCtxRef.current);
          // Apply current params to graph
          var g = audioGraphRef.current;
          var p = paramsRef.current;
          g.waveshaper.curve = makeDistortionCurve(p.distortion);
          g.delayNode.delayTime.setValueAtTime(Math.max(p.delayTime, 0.001), audioCtxRef.current.currentTime);
          g.delayFb.gain.setValueAtTime(p.delayFeedback, audioCtxRef.current.currentTime);
          g.delayWet.gain.setValueAtTime(p.delayTime > 0 ? p.delayMix : 0, audioCtxRef.current.currentTime);
          if (p.reverbDecay > 0) g.convolver.buffer = createReverbIR(audioCtxRef.current, p.reverbDecay);
          g.reverbWet.gain.setValueAtTime(p.reverbDecay > 0 ? p.reverbMix : 0, audioCtxRef.current.currentTime);
        }
        var ctx = audioCtxRef.current;
        if (ctx.state === "suspended") {
          ctx.resume().then(function() { setAudioReady(true); });
        } else {
          setAudioReady(true);
        }
        return ctx;
      }, []);

      // Update effects when params change
      useEffect(function() {
        var g = audioGraphRef.current;
        if (!g) return;
        g.waveshaper.curve = makeDistortionCurve(params.distortion);
      }, [params.distortion]);

      useEffect(function() {
        var g = audioGraphRef.current;
        if (!g || !audioCtxRef.current) return;
        var now = audioCtxRef.current.currentTime;
        g.delayNode.delayTime.setValueAtTime(Math.max(params.delayTime, 0.001), now);
        g.delayFb.gain.setValueAtTime(params.delayFeedback, now);
        g.delayWet.gain.setValueAtTime(params.delayTime > 0 ? params.delayMix : 0, now);
      }, [params.delayTime, params.delayFeedback, params.delayMix]);

      useEffect(function() {
        var g = audioGraphRef.current;
        if (!g || !audioCtxRef.current) return;
        var now = audioCtxRef.current.currentTime;
        if (params.reverbDecay > 0) {
          try { g.convolver.buffer = createReverbIR(audioCtxRef.current, params.reverbDecay); } catch(ex) {}
        }
        g.reverbWet.gain.setValueAtTime(params.reverbDecay > 0 ? params.reverbMix : 0, now);
      }, [params.reverbDecay, params.reverbMix]);

      // ===== Play Click =====
      var playClick = useCallback(function(speed) {
        var ctx = audioCtxRef.current;
        var graph = audioGraphRef.current;
        if (!ctx || ctx.state !== "running" || !graph) return;
        var p = paramsRef.current;
        var now = ctx.currentTime;
        var speedFactor = Math.min(Math.abs(speed) / 12, 1);
        var intensity = 0.5 + 0.5 * speedFactor;
        var variation = 1 + (Math.random() - 0.5) * p.pitchVariation;
        var freq = p.clickFreq * variation;
        var masterVol = p.clickVolume * intensity;
        var maxDur = Math.max(p.clickDecay, p.noiseDecay) * 3 + p.attack + 0.1;

        // Per-click master gain with attack
        var clickMaster = ctx.createGain();
        if (p.attack > 0.001) {
          clickMaster.gain.setValueAtTime(0, now);
          clickMaster.gain.linearRampToValueAtTime(masterVol, now + p.attack);
        } else {
          clickMaster.gain.setValueAtTime(masterVol, now);
        }
        clickMaster.connect(graph.masterBus);

        // Filter for entire click
        var filter = ctx.createBiquadFilter();
        filter.type = p.filterType;
        if (p.filterEnvAmount > 0) {
          filter.frequency.setValueAtTime(p.filterCutoff + p.filterEnvAmount, now);
          filter.frequency.setTargetAtTime(p.filterCutoff, now + 0.001, Math.max(p.filterEnvDecay * 0.3, 0.001));
        } else {

                }
              },
                pegs.map(function(deg, i) {
                  return e("div", { key: i, style: {
                    position: "absolute", top: "50%", left: "50%",
                    width: 3, height: "46%", transformOrigin: "50% 0%",
                    transform: "rotate(" + (deg + (angle * 180 / Math.PI)) + "deg)",
                    pointerEvents: "none",
                  }},
                    e("div", { style: {
                      position: "absolute", bottom: 2, left: "50%", transform: "translateX(-50%)",
                      width: 6, height: 6, borderRadius: "50%",
                      background: i % 3 === 0 ? "#f5c542" : "#3a3540",
                    }})
                  );
                }),
                // Center hub
                e("div", { style: {
                  position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
                  width: 48, height: 48, borderRadius: "50%",
                  background: "radial-gradient(circle, #2a2630 0%, #14131a 100%)",
                  border: "2px solid #3a3540",
                  display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none",
                }},
                  e("div", { style: {
                    width: 8, height: 8, borderRadius: "50%",
                    background: isSpinning ? "#f5c542" : "#3a3540", transition: "background 0.3s",
                  }})
                )
              ),

              // Speed display
              e("div", { style: {
                position: "absolute", bottom: -28, left: "50%", transform: "translateX(-50%)",
                fontSize: 11, color: "#665e4d", letterSpacing: 2, whiteSpace: "nowrap",
              }}, isSpinning ? "\u25B8 " + speedDisplay + " rad/s" : isDragging ? "\u25C9 DRAGGING" : "SWIPE TO SPIN")
            ),

            // Test click
            e("button", { onClick: testClick, style: btnStyle }, "\u25B6 TEST CLICK"),

            // Oscilloscope
            e("div", { style: { width: "100%", maxWidth: 560 } },
              e("div", { style: {
                padding: "6px 14px", background: "#16151e", borderRadius: "6px 6px 0 0",
                border: "1px solid #1e1d28", borderBottom: "none",
                fontSize: 10, letterSpacing: 2, color: "#665e4d", textTransform: "uppercase",
              }}, "OSCILLOSCOPE"),
              e("canvas", {
                ref: scopeRef, width: 560, height: 120,
                style: { width: "100%", height: 120, display: "block", background: "#0c0b14",
                  borderRadius: "0 0 6px 6px", border: "1px solid #1e1d28", borderTop: "none" }
              })
            ),

            // Parameter sections
            PARAM_SECTIONS.map(function(section) {
              var isOpen = openSections[section.key];
              return e("div", { key: section.key, style: { width: "100%", maxWidth: 560 } },
                // Section header
                e("div", {
                  onClick: function() { toggleSection(section.key); },
                  style: {
                    padding: "8px 14px", background: "#16151e", cursor: "pointer",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    borderRadius: isOpen ? "6px 6px 0 0" : 6,
                    border: "1px solid #1e1d28",
                    borderBottom: isOpen ? "none" : "1px solid #1e1d28",
                  }
                },
                  e("span", { style: { fontSize: 11, letterSpacing: 2, color: "#f5c542" } }, section.title),
                  e("span", { style: { fontSize: 10, color: "#665e4d" } }, isOpen ? "\u25BE" : "\u25B8")
                ),
                // Section body
                isOpen && e("div", { style: {
                  display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))",
                  gap: "2px", background: "#16151e", borderRadius: "0 0 6px 6px",
                  overflow: "hidden", border: "1px solid #1e1d28", borderTop: "none",
                }},
                  section.params.map(function(param) {
                    if (param.type === "select") {
                      return e("div", { key: param.key, style: rowStyle },
                        e("label", { style: lblStyle }, param.label),
                        e("select", {
                          value: params[param.key],
                          onChange: function(ev) { updateParam(param.key, ev.target.value); },
                          style: selStyle,
                        },
                          param.options.map(function(opt) {
                            return e("option", { key: opt, value: opt },
                              opt.charAt(0).toUpperCase() + opt.slice(1));
                          })
                        )
                      );
                    }
                    return e("div", { key: param.key, style: rowStyle },
                      e("label", { style: lblStyle }, param.label),
                      e("input", {
                        type: "range", min: param.min, max: param.max, step: param.step,
                        value: params[param.key],
                        onChange: function(ev) { updateParam(param.key, ev.target.value); },
                        style: { flex: 1, height: 4, accentColor: "#f5c542", cursor: "pointer" },
                      }),
                      e("span", { style: valStyle },
                        params[param.key],
                        param.unit ? e("span", { style: { color: "#665e4d", marginLeft: 1 } }, param.unit) : null
                      )
                    );
                  })
                )
              );
            }),

            // Presets + Reset + Random
            e("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" } },
              PRESETS.map(function(preset) {
                return e("button", {
                  key: preset.name,
                  onClick: function() { setParams(Object.assign({}, preset.p)); },
                  style: btnStyle,
                  onMouseEnter: function(ev) { ev.target.style.borderColor = "#f5c542"; ev.target.style.color = "#f5c542"; },
                  onMouseLeave: function(ev) { ev.target.style.borderColor = "#2a2630"; ev.target.style.color = "#998e75"; },
                }, preset.name);
              }),
              e("button", {
                onClick: function() { setParams(Object.assign({}, DEFAULTS)); },
                style: Object.assign({}, btnStyle, { color: "#665e4d", borderColor: "#1e1d28" }),
                onMouseEnter: function(ev) { ev.target.style.borderColor = "#f5c542"; ev.target.style.color = "#f5c542"; },
                onMouseLeave: function(ev) { ev.target.style.borderColor = "#1e1d28"; ev.target.style.color = "#665e4d"; },
              }, "RESET"),
              e("button", {
                onClick: randomize,
                style: Object.assign({}, btnStyle, { color: "#665e4d", borderColor: "#1e1d28" }),
                onMouseEnter: function(ev) { ev.target.style.borderColor = "#ff6b35"; ev.target.style.color = "#ff6b35"; },
                onMouseLeave: function(ev) { ev.target.style.borderColor = "#1e1d28"; ev.target.style.color = "#665e4d"; },
              }, "RANDOM")
            ),

            // Dart code button
            e("button", {
              onClick: function() { setShowDart(!showDart); },
              style: {
                padding: "12px 32px",
                background: showDart ? "#f5c542" : "transparent",
                border: "2px solid #f5c542", borderRadius: 6,
                color: showDart ? "#0a0a0f" : "#f5c542",
                fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif",
                cursor: "pointer", letterSpacing: 2, textTransform: "uppercase",
              }
            }, showDart ? "\u2715 CLOSE" : "\u2B21 GENERATE DART CODE"),

            // Dart code panel
            showDart && e("div", { style: { width: "100%", maxWidth: 700, position: "relative" } },
              e("button", {
                onClick: function() { navigator.clipboard.writeText(generateDart()); },
                style: {
                  position: "absolute", top: 8, right: 8,
                  padding: "4px 12px", background: "#1e1d28",
                  border: "1px solid #3a3540", borderRadius: 4,
                  color: "#f5c542", fontSize: 11, cursor: "pointer", zIndex: 2, letterSpacing: 1,
                }
              }, "COPY"),
              e("pre", { style: {
                background: "#0c0b14", border: "1px solid #1e1d28",
                borderRadius: 8, padding: 16, fontSize: 11, lineHeight: 1.6,
                color: "#c8c0b0", overflow: "auto", maxHeight: 500,
                margin: 0, whiteSpace: "pre", tabSize: 2,
              }}, generateDart())
            ),

            // Footer
            e("div", { style: {
              textAlign: "center", padding: "16px 0 32px",
              fontSize: 10, color: "#2a2630", letterSpacing: 2,
            }}, "DRAG THE WHEEL \u00B7 ADJUST PARAMETERS \u00B7 EXPORT TO DART")
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(WheelSynth));
  </script>
</body>
</html>
